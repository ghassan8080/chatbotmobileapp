version: "2"
type: frontend
tech_stack:
  - React Native
  - Expo
  - Axios
  - AsyncStorage
routes:
  - path: Login
    file: src/screens/LoginScreen.js
    auth_required: false
    description: User login page
  - path: Products
    file: src/screens/ProductListScreen.js
    auth_required: true
    description: List of products
  - path: ProductDetail
    file: src/screens/ProductDetailScreen.js
    auth_required: true
    description: Product detail view
  - path: ProductForm
    file: src/screens/ProductFormScreen.js
    auth_required: true
    description: Create or edit a product
  - path: Orders
    file: src/screens/OrdersListScreen.js
    auth_required: true
    description: List of user orders
features:
  - name: User Login
    description: Login with email/phone and password credentials
    files:
      - src/screens/LoginScreen.js
      - src/context/AuthContext.js
    entry_route: Login
    user_interactions:
      - Fill login input field
      - Fill password input field
      - Click Login button to submit
    api_calls:
      - method: POST
        endpoint: /login
    auth_required: false
  - name: View Products
    description: View product list
    files:
      - src/screens/ProductListScreen.js
      - src/hooks/useProducts.js
    entry_route: Products
    user_interactions:
      - Load products
      - See products in list
    api_calls:
      - method: GET
        endpoint: /products
    auth_required: true
  - name: Create or Edit Product
    description: Add a new product or edit an existing one
    files:
      - src/screens/ProductFormScreen.js
    entry_route: ProductForm
    user_interactions:
      - Fill product details
      - Add images
      - Submit form
    api_calls:
      - method: POST
        endpoint: /add-product
      - method: POST
        endpoint: /update-product
    auth_required: true
  - name: Delete Product
    description: Delete a specific product
    files:
      - src/screens/ProductListScreen.js
      - src/screens/ProductDetailScreen.js
    entry_route: Products
    user_interactions:
      - Click Delete button on a product
      - Confirm deletion
    api_calls:
      - method: POST
        endpoint: /delete-product
    auth_required: true
  - name: Manage Orders
    description: View and confirm/delete orders
    files:
      - src/screens/OrdersListScreen.js
    entry_route: Orders
    user_interactions:
      - View list of orders
      - Click confirm order webhook
      - Click delete order webhook
    api_calls:
      - method: GET
        endpoint: /orders
      - method: POST
        endpoint: /webhook/confirm-booking
      - method: POST
        endpoint: /webhook/delete-order
    auth_required: true
known_limitations: []
