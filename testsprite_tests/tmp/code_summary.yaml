version: "2"
type: frontend
tech_stack:
  - react-native
  - expo
  - react-navigation
routes:
  - path: /login
    file: src/screens/LoginScreen.js
    auth_required: false
    description: User login page
  - path: /product-list
    file: src/screens/ProductListScreen.js
    auth_required: true
    description: Main product listing page
  - path: /product-form
    file: src/screens/ProductFormScreen.js
    auth_required: true
    description: Add or edit a product
  - path: /product-detail
    file: src/screens/ProductDetailScreen.js
    auth_required: true
    description: View product details
  - path: /orders-list
    file: src/screens/OrdersListScreen.js
    auth_required: true
    description: View and manage orders
features:
  - name: User Login
    description: Login with email and password credentials
    files:
      - src/screens/LoginScreen.js
      - src/api/authApi.js
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button to submit
      - See error message on invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Product Management
    description: View, add, edit, or delete products with image upload
    files:
      - src/screens/ProductListScreen.js
      - src/screens/ProductFormScreen.js
      - src/screens/ProductDetailScreen.js
      - src/api/productApi.js
      - src/api/uploadApi.js
    entry_route: /product-list
    user_interactions:
      - View list of products
      - Pull to refresh products
      - Click to view product details
      - Click Add Product to open form
      - Fill product details and upload image
      - Click Submit to create/update product
      - Click Delete to remove product
    api_calls:
      - method: GET
        endpoint: /api/products
      - method: POST
        endpoint: /api/products
      - method: PUT
        endpoint: /api/products
      - method: DELETE
        endpoint: /api/products
    auth_required: true
  - name: Order Management
    description: View order list and confirm or delete orders
    files:
      - src/screens/OrdersListScreen.js
      - src/api/ordersApi.js
    entry_route: /orders-list
    user_interactions:
      - View list of orders
      - Pull to refresh orders
      - Click Confirm order
      - Click Delete order
    api_calls:
      - method: GET
        endpoint: /api/orders
      - method: POST
        endpoint: /webhook/confirm-booking
      - method: POST
        endpoint: /webhook/delete-order
    auth_required: true
known_limitations: []
